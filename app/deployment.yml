apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockerized-react
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dockerized-react
  template:
    metadata:
      labels:
        app: dockerized-react
    spec:
      containers:
        - name: dockerized-react
          image: sheldons23/dockerized-react:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dockerized-react
spec:
  type: NodePort
  selector:
    app: dockerized-react
  ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
      nodePort: 31000